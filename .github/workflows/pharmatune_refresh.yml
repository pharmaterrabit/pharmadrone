name: PharmaTune scheduled refresh

on:
  # One-time regulator bootstrap: changing this workflow on main runs the
  # official EMA, MHRA and FDA jobs against the production DATABASE_URL.
  push:
    branches: [main]
    paths: [.github/workflows/pharmatune_refresh.yml]
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run due sources, one source, or retry failed sources"
        required: true
        default: "due"
        type: choice
        options: [due, source, retry-failed]
      source:
        description: "Source name when mode=source"
        required: false
        default: "openfda_enforcement"
        type: choice
        options:
          - fda_orange_book
          - ema_medicines
          - mhra_medicine_recalls
          - openfda_enforcement
          - openfda_shortages
          - openfda_labels
          - clinicaltrials
          - europepmc
          - openalex
          - crossref
          - tavily
          - monthly_maintenance
      force:
        description: "Force the selected source even when not due"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "Show due work without writing source/opportunity data"
        required: false
        default: false
        type: boolean
      lookback_days:
        description: "Bounded lookback window"
        required: false
        default: "14"
        type: string

permissions:
  contents: read

concurrency:
  group: pharmatune-refresh-orchestrator
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      APP_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      LLM_PROVIDER: openrouter
      SCHEDULER_MAX_LLM_CALLS: "0"
      SCHEDULER_MAX_CONCURRENT_JOBS: "1"
      SCHEDULER_LOOKBACK_DAYS: ${{ inputs.lookback_days || '14' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bootstrap EMA, MHRA and FDA production data
        if: github.event_name == 'push'
        run: |
          status=0
          for source in ema_medicines mhra_medicine_recalls fda_orange_book; do
            python -m pharmadrone.scheduler run-source "$source" --force --lookback-days "${SCHEDULER_LOOKBACK_DAYS}" || status=1
          done
          exit "$status"

      - name: Run due sources on schedule
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'due')
        run: |
          EXTRA=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then EXTRA="--dry-run"; fi
          python -m pharmadrone.scheduler run-due $EXTRA --lookback-days "${SCHEDULER_LOOKBACK_DAYS}"

      - name: Run selected source
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'source'
        run: |
          EXTRA=""
          if [ "${{ inputs.force }}" = "true" ]; then EXTRA="$EXTRA --force"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then EXTRA="$EXTRA --dry-run"; fi
          python -m pharmadrone.scheduler run-source "${{ inputs.source }}" $EXTRA --lookback-days "${SCHEDULER_LOOKBACK_DAYS}"

      - name: Retry failed sources
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'retry-failed'
        run: |
          EXTRA=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then EXTRA="--dry-run"; fi
          python -m pharmadrone.scheduler retry-failed $EXTRA --lookback-days "${SCHEDULER_LOOKBACK_DAYS}"
